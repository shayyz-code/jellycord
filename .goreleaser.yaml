# .goreleaser.yaml
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: jellycord-cli
    main: ./cli/cmd/jellycord
    binary: jellycord
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    # use zip for windows archives
    format_overrides:
      - goos: windows
        format: zip
    name_template: >-
      {{ .ProjectName }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}

checksum:
  name_template: "checksums.txt"

snapshot:
  name_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

release:
  github:
    owner: shayyz-code
    name: jellycord

brews:
  - name: jellycord
    repository:
      owner: shayyz-code
      name: homebrew-tap
    directory: Formula
    homepage: "https://github.com/shayyz-code/jellycord"
    description: "CLI chat client for Jellycord"
    install: |
      bin.install "jellycord"

scoops:
  - name: jellycord
    repository:
      owner: shayyz-code
      name: scoop-bucket
    homepage: "https://github.com/shayyz-code/jellycord"
    description: "CLI chat client for Jellycord"
    license: MIT
