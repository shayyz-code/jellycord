services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: unless-stopped
    environment:
      JELLYCORD_ADDR: ":8080"
      JELLYCORD_REDIS_URL: "redis://redis:6379/0"
    depends_on:
      - redis
    ports:
      - "127.0.0.1:8080:8080"

